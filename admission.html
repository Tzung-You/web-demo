<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全台課表 - 太極拳丹道武術</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: #e0e0e0; overflow-x: hidden; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .gradient-text { background: linear-gradient(135deg, #d4af37 0%, #ffcc5d 50%, #ff9800 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        th { background: #d4af37; color: #000; padding: 1.5rem; font-weight: 900; }
        td { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-link { position: relative; padding: 0.5rem 0; transition: 0.3s; font-weight: 500; }
        .nav-link:hover { color: var(--gold); }
        .taiji-symbol { width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(to right, var(--gold) 50%, #1a1a1a 50%); animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pt-24 px-6">
    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0a] border-b border-[#d4af37]/20 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center text-sm font-bold">
            <a href="index.html" class="flex items-center gap-3">
                <div class="taiji-symbol"></div>
                <span class="text-xl font-black gradient-text serif tracking-tight">太極拳丹道武術</span>
            </a>
            <div class="hidden md:flex items-center gap-10">
                <a href="index.html" class="nav-link">首頁入口</a>
                <a href="courses.html" class="nav-link">教學體系</a>
                <a href="media.html" class="nav-link">影音專區</a>
                <a href="admission.html" class="nav-link text-[#d4af37]">最新招生</a>
                <a href="https://testdem9727.blogspot.com/" target="_blank" class="nav-link text-[#d4af37]">老師網誌</a>
            </div>
            <button id="menu-btn" class="md:hidden text-[#d4af37] text-2xl font-bold p-2 focus:outline-none">☰</button>
        </div>
    </nav>

    <div id="mobile-menu" class="hidden fixed top-20 left-0 w-full bg-[#0a0a0a] border-b border-[#d4af37]/20 z-40 flex flex-col items-center py-8 gap-6 font-bold text-lg md:hidden">
        <a href="index.html">首頁入口</a>
        <a href="courses.html">教學體系</a>
        <a href="media.html">影音專區</a>
        <a href="admission.html" class="text-[#d4af37]">最新招生</a>
        <a href="https://testdem9727.blogspot.com/" target="_blank" class="text-[#d4af37]">老師網誌</a>
    </div>

    <main class="max-w-6xl mx-auto py-16 text-center">
        <h1 class="text-4xl font-black mb-16 serif gradient-text uppercase tracking-widest">全台教學據點與課表</h1>
        
        <div class="overflow-x-auto rounded-2xl border border-[#d4af37]/30 shadow-2xl mb-12">
            <table class="w-full text-center">
                <thead>
                    <tr>
                        <th class="whitespace-nowrap">地區班別</th>
                        <th class="whitespace-nowrap">上課時間</th>
                        <th class="whitespace-nowrap">地點資訊</th>
                        <th class="whitespace-nowrap">學費費用</th>
                    </tr>
                </thead>
                <tbody id="schedule-body" class="text-lg text-gray-300">
                    <tr><td colspan="4" class="p-20 italic text-gray-500">正在同步雲端最新課表...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="bg-[#181818] p-12 rounded-3xl border-l-8 border-[#d4af37] shadow-xl">
            <h2 class="text-2xl font-bold mb-6 serif text-white">即時報名與動態</h2>
            <p class="text-gray-400 mb-10 leading-relaxed">最新的開課日期與報名細節，請點擊下方按鈕至 Facebook 官方帳號查看。</p>
            <a href="https://www.facebook.com/profile.php?id=100057333705024" target="_blank" class="inline-block bg-[#1877F2] text-white px-12 py-4 rounded-xl font-black text-xl hover:scale-105 transition shadow-lg">
                Facebook 最新招生動態
            </a>
        </div>

        <footer class="mt-32 text-center pt-20 border-t border-white/5">
            <h2 class="text-2xl font-bold mb-6 gradient-text serif">聯絡吳老師</h2>
            <p class="text-4xl font-black mb-4">0918-14-88-14</p>
            <p class="text-gray-500 mb-10 text-sm tracking-widest uppercase">© 2026 TAIJI DAN DAO MARTIAL ARTS</p>
        </footer>
    </main>

    <script>
        // 手機選單切換
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });

        // 雲端試算表同步邏輯
        const spreadsheetId = '18Rah2LwqrAWVPgXb0UZQoL1P93-aUFhr_SeuXNSkbTI';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv`;

        async function fetchSchedule() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // 處理 CSV 資料 (解析逗號，但忽略引號內的逗號)
                const rows = data.split(/\r?\n/).slice(1); 
                let html = '';
                
                rows.forEach(row => {
                    // 簡單解析 CSV 行
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (cols && cols.length >= 4) {
                        const region = cols[0].replace(/"/g, '');
                        const time = cols[1].replace(/"/g, '');
                        const location = cols[2].replace(/"/g, '');
                        const fee = cols[3].replace(/"/g, '');
                        
                        html += `
                            <tr class="hover:bg-white/5 transition">
                                <td class="text-[#d4af37] font-bold">${region}</td>
                                <td>${time}</td>
                                <td class="text-gray-400 text-sm md:text-lg text-left">${location}</td>
                                <td class="font-bold text-white">${fee}</td>
                            </tr>
                        `;
                    }
                });
                
                document.getElementById('schedule-body').innerHTML = html || '<tr><td colspan="4" class="p-10">目前尚無排定課程。</td></tr>';
            } catch (err) {
                console.error('Error fetching spreadsheet:', err);
                document.getElementById('schedule-body').innerHTML = '<tr><td colspan="4" class="p-10 text-red-500">暫時無法讀取課表，請參考 FB 最新資訊。</td></tr>';
            }
        }

        // 啟動抓取
        fetchSchedule();
    </script>
</body>
</html>
