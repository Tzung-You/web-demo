<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太極拳丹道武術 - 官方網站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: #e0e0e0; overflow-x: hidden; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .gradient-text { background: linear-gradient(135deg, #d4af37 0%, #ffcc5d 50%, #ff9800 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-link { position: relative; padding: 0.5rem 0; transition: 0.3s; font-weight: 500; }
        .nav-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--gold); transition: 0.3s; }
        .nav-link:hover::after { width: 100%; }
        .taiji-symbol { width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(to right, var(--gold) 50%, #1a1a1a 50%); animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { opacity: 0; transform: translateY(20px); transition: 1s ease-out; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0a] border-b border-[#d4af37]/20 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="taiji-symbol"></div>
                <span class="text-xl font-black gradient-text serif tracking-tight">太極拳丹道武術</span>
            </a>
            <div class="hidden md:flex items-center gap-8 text-sm">
                <a href="index.html" class="nav-link text-[#d4af37]">首頁入口</a>
                <a href="courses.html" class="nav-link">教學體系</a>
                <a href="media.html" class="nav-link">影音專區</a>
                <a href="admission.html" class="nav-link">最新招生</a>
                <a href="https://testdem9727.blogspot.com/" target="_blank" class="nav-link border-l border-white/20 pl-6 text-[#d4af37]">老師網誌</a>
            </div>
            <button id="menu-btn" class="md:hidden text-[#d4af37] text-2xl font-bold p-2">☰</button>
        </div>
    </nav>

    <div id="mobile-menu" class="hidden fixed top-20 left-0 w-full bg-[#0a0a0a] border-b border-[#d4af37]/20 z-40 flex flex-col items-center py-8 gap-6 font-bold text-lg md:hidden">
        <a href="index.html" class="text-[#d4af37]">首頁入口</a>
        <a href="courses.html">教學體系</a>
        <a href="media.html">影音專區</a>
        <a href="admission.html">最新招生</a>
        <a href="https://testdem9727.blogspot.com/" target="_blank" class="text-[#d4af37]">老師網誌</a>
    </div>

    <header class="pt-48 pb-32 px-6 text-center">
        <div class="fade-in max-w-5xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-black mb-10 serif leading-tight">太極，是內在能量的修煉<br><span class="gradient-text">而不僅僅是外在招式的演練</span></h1>
            <p class="text-2xl md:text-3xl text-[#d4af37] mb-12 serif italic">「太極的靈魂不在套路，而在於體內的勁氣能量。」</p>
            <div class="flex flex-col md:flex-row justify-center gap-8">
                <a href="courses.html" class="bg-[#d4af37] text-black px-12 py-4 rounded-lg font-black text-xl hover:shadow-[0_0_20px_#d4af37] transition">深入探索修煉體系</a>
                <a href="admission.html" class="border-2 border-[#d4af37] text-[#d4af37] px-12 py-4 rounded-lg font-black text-xl hover:bg-[#d4af37]/10 transition">查看全台課表</a>
            </div>
        </div>
    </header>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => menu.classList.toggle('hidden'));
        const obs = new IntersectionObserver((es) => {
            es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
    </script>
</body>
</html>
