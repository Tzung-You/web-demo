<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影音專區 - 太極拳丹道武術</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: #e0e0e0; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .gradient-text { background: linear-gradient(135deg, #d4af37 0%, #ffcc5d 50%, #ff9800 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1rem; border: 1px solid rgba(212,175,55,0.2); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .video-card { background: #111; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
        .unit-header { border-left: 8px solid var(--gold); padding-left: 1.5rem; margin: 4rem 0 2rem 0; }
        .taiji-symbol { width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(to right, #d4af37 50%, #1a1a1a 50%); animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pt-24 px-6">
    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0a] border-b border-[#d4af37]/20 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center text-sm font-bold">
            <a href="index.html" class="flex items-center gap-3"><div class="taiji-symbol"></div><span class="text-xl font-black gradient-text serif tracking-tight">太極拳丹道武術</span></a>
            <div class="hidden md:flex items-center gap-10">
                <a href="index.html">首頁入口</a>
                <a href="courses.html">教學體系</a>
                <a href="media.html" class="text-[#d4af37]">影音專區</a>
                <a href="admission.html">最新招生</a>
                <a href="https://testdem9727.blogspot.com/" target="_blank" class="text-[#d4af37]">老師網誌</a>
            </div>
            <button id="menu-btn" class="md:hidden text-[#d4af37] text-2xl font-bold">☰</button>
        </div>
    </nav>

    <div id="mobile-menu" class="hidden fixed top-20 left-0 w-full bg-[#0a0a0a] border-b border-[#d4af37]/20 z-40 flex flex-col items-center py-8 gap-6 font-bold text-lg md:hidden">
        <a href="index.html">首頁入口</a>
        <a href="courses.html">教學體系</a>
        <a href="media.html" class="text-[#d4af37]">影音專區</a>
        <a href="admission.html">最新招生</a>
        <a href="https://testdem9727.blogspot.com/" target="_blank" class="text-[#d4af37]">老師網誌</a>
    </div>

    <main class="max-w-6xl mx-auto py-16">
        <h1 class="text-4xl font-black mb-6 serif gradient-text text-center tracking-tight">影音教學庫：開發您的勁氣能量</h1>
        <section>
            <div class="unit-header"><h2 class="text-3xl font-bold serif text-white">第一單元：內功與勁氣核心</h2></div>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 text-center">
                <div class="video-card">
                    <div class="video-container mb-4"><iframe src="https://www.youtube.com/embed/xZ0MLlobESk" frameborder="0" allowfullscreen></iframe></div>
                    <h4 class="font-bold text-white italic">【內功三大層次】</h4>
                </div>
                </div>
        </section>
    </main>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => menu.classList.toggle('hidden'));
    </script>
</body>
</html>
